name: Publish (pypi)

on:
  release:
    types:
      - created

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: release
      deployment: true
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # ratchet:actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: |
          pip install -r requirements.setup.txt
      - name: Publish
        env:
          UV_PUBLISH_TOKEN: "${{ secrets.PYPI_API_TOKEN }}"
        run: |
          bash dev/publish.sh "pypi"

  test-published-package:
    needs:
      - publish
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # ratchet:actions/setup-python@v6
        with:
          python-version: "${{ matrix.python-version }}"
      # It takes some time when the package gets available.
      - name: Sleep
        run: |
          sleep 30
      - name: Install package
        run: |
          python3 -m pip install -U dbt-artifacts-parser
      - name: Test package
        run: |
          python -c 'import dbt_artifacts_parser; print(dbt_artifacts_parser.__version__)'
