# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
  sources:
    - id: trunk
      ref: v1.10.0
      uri: https://github.com/trunk-io/plugins
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - node@22.16.0
    - python@3.14.4
# Linters aligned with .pre-commit-config.yaml (generated parsers are excluded).
lint:
  enabled:
    - actionlint@1.7.12
    - git-diff-check
    - pylint@4.0.5
    - ruff@0.15.14
    - shellcheck@0.11.0
  ignore:
    - linters: [ALL]
      paths:
        # Generated Pydantic models — do not lint or format (see CONTRIBUTING.md).
        - dbt_artifacts_parser/parsers/**
# Pre-commit remains the primary git hook; Trunk is available via ./trunk and make targets.
actions:
  disabled:
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
  enabled:
    - trunk-announce
    - trunk-upgrade-available
